services:
  - type: web
    name: sst-prime-ia
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.6
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AI_ACCESS_KEY
        generateValue: true
      - key: MAX_OUTPUT_TOKENS
        value: 1800
      - key: RATE_LIMIT_WINDOW_MINUTES
        value: 15
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 35
